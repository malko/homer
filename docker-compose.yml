services:
  caddy:
    image: caddy:2-alpine
    container_name: homer-caddy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /etc/caddy/Caddyfile <<'EOF'
        {
          admin 0.0.0.0:2019 {
            origins http://caddy:2019
          }
        }
        EOF
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    networks:
      - homer-internal
      - homer-services
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x caddy || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s

  homer:
    image: ghcr.io/malko/homer:${HOMER_VERSION:-latest}
    container_name: homer
    environment:
      - NODE_ENV=production
      - PORT=4000
      - HOST=0.0.0.0
      - CADDY_ADMIN_URL=http://caddy:2019
      - HOMER_DOMAIN=${HOMER_DOMAIN:-$(uname -n).local}
      - HOMER_GITHUB_REPO=malko/homer
      - HOMER_IMAGE=ghcr.io/malko/homer:${HOMER_VERSION:-latest}
      - HOMER_COMPOSE_FILE=/host/path/to/docker-compose.yml
      - AVAHI_ENABLED=${AVAHI_ENABLED:-auto}
      - HOST_IP=${HOST_IP:-}
      - MDNS_IMAGE=ghcr.io/malko/homer:${HOMER_VERSION:-latest}
    volumes:
      - ./data:/app/data
      - ./data/caddy/data:/app/caddy-data:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
    depends_on:
      caddy:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - homer-internal
      - homer-services

networks:
  homer-internal:
    external: false
    name: homer-internal
  homer-services:
    external: false
    name: homer-services
